name: Feature request
description: Suggest an improvement for Web Agent
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity
      description: What is missing or painful today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should happen instead?
    validations:
      required: true
  - type: textarea
    id: use_case
    attributes:
      label: Use case
      description: Why does this matter?
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Extra context
      description: Links, sketches, references, or related tools.
